name: K-pop Intelligence Daily

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install requests feedparser

      - name: 뉴스레터 생성
        env:
          SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          YOUTUBE_API_KEY:       ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/generate.py

      - name: 생성된 파일 커밋 & 푸시
        run: |
          git config user.name  "kpop-bot"
          git config user.email "bot@kpop-intelligence.com"
          git add newsletters/
          git diff --staged --quiet || git commit -m "auto: $(date '+%Y-%m-%d') 뉴스레터 생성"
          git push
